services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  code-atlas:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - CODE_ATLAS_OLLAMA__BASE_URL=http://ollama:11434
    restart: unless-stopped

volumes:
  ollama-models: {}
